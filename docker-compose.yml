version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      # Optional: Mount .env to root if you need runtime vars (though strictly Vite embeds them at build)
      # This is more for documentation/completeness if we move to a runtime server later.
      - ./.env:/app/.env
    restart: always
